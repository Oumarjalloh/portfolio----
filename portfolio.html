function h2r(h) {
  h = h.replace("#", "");
  if (h.length === 3) h = h.split("").map(x => x + x).join("");
  return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
}
function mix(a, b, t) {
  const x = h2r(a), y = h2r(b);
  const r = Math.round(x[0] + (y[0] - x[0]) * t);
  const g = Math.round(x[1] + (y[1] - x[1]) * t);
  const bl = Math.round(x[2] + (y[2] - x[2]) * t);
  return "rgb(" + r + "," + g + "," + bl + ")";
}

function buildStack(fr) {

        ),
        e("span", { className: "lang-switch" },
          e("button", { className: "lang-btn" + (fr ? " lang-btn--active" : ""), onClick: () => setLang("fr") }, "FR"),
          e("button", { className: "lang-btn" + (!fr ? " lang-btn--active" : ""), onClick: () => setLang("en") }, "EN")
        ),
        e("button", { className: "theme-toggle", "aria-label": "toggle theme", onClick: () => setTheme(dark ? "light" : "dark") }, dark ? "☀" : "☾")
      )
    ),

    e("section", { "data-sec": "", className: "page", style: { position: "relative", padding: "80px 28px 70px" } },
      e("div", { className: "hero-bg" }),
      e("div", { className: "hero-grid", style: { position: "relative" } },
        e("div", null,
          e("div", { style: { fontSize: 13, color: "var(--accent,#5eead4)", letterSpacing: ".04em", marginBottom: 18 } }, t.heroKicker),
